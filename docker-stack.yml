# Docker Swarm stack for production.
#
# Deploy:
#   docker stack deploy -c docker-stack.yml app
#
# See docs/deployment/production.md for full provisioning steps.

version: "3.8"

services:
  # ─── Traefik reverse proxy (SSL termination via Let's Encrypt) ────────────
  traefik:
    image: traefik:v3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - traefik_acme:/acme
    networks:
      - app-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── Django web server ────────────────────────────────────────────────────
  web:
    image: ghcr.io/${GHCR_REPO}/app:${IMAGE_TAG:-latest}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${PRODUCTION_HOST}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=8000"
      - "traefik.http.services.web.loadbalancer.healthcheck.path=/health/"
      - "traefik.http.services.web.loadbalancer.healthcheck.interval=30s"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - db
      - redis
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── Celery worker ─────────────────────────────────────────────────────────
  celery-worker:
    image: ghcr.io/${GHCR_REPO}/app:${IMAGE_TAG:-latest}
    command: celery -A config.celery worker -l info -n celery@%h
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PROJECT_ROOT: /project
      NOTEBOOKS_DIR: /project/notebooks
      NOTEBOOK_OUTPUT_DIR: /project/data/notebook_outputs
    volumes:
      - notebook_outputs:/project/data/notebook_outputs
    networks:
      - app-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── Flower (Celery monitor — SSH tunnel only, not exposed via Traefik) ───
  flower:
    image: ghcr.io/${GHCR_REPO}/app:${IMAGE_TAG:-latest}
    command: celery -A config.celery flower --port=5555
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── S3-compatible storage ─────────────────────────────────────────────────
  # In production, prefer AWS S3 directly (set AWS_S3_ENDPOINT_URL=None in
  # production.py). Keep this service for self-hosted deployments only.
  rustfs:
    image: rustfs/rustfs:latest
    command: --address 0.0.0.0:9000 /data
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── OpenTelemetry Collector ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol/config.yml"]
    env_file:
      - .env.production
    volumes:
      - ./otel/collector-production.yml:/etc/otelcol/config.yml:ro
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── Mojo compute container ─────────────────────────────────────────────────
  # Runs MOJO-type pipeline steps; dispatched via HTTP POST /execute.
  # AWS credentials flow through the environment via the standard credential chain.
  mojo-compute:
    image: ghcr.io/${GHCR_REPO}/mojo-compute:${IMAGE_TAG:-latest}
    env_file:
      - .env.production
    environment:
      SCRIPTS_DIR: /mojo
      PORT: "8080"
    volumes:
      - mojo_scripts:/mojo:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── PostgreSQL backup (run-once service triggered by cron) ───────────────
  # Cron on the manager node:
  #   0 2 * * * docker service update --force app_pg-backup
  pg-backup:
    image: postgres:18-alpine
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    entrypoint: >
      sh -c "
        pg_dump -h db -U ${DB_USER:-app} ${DB_NAME:-app} | gzip |
        aws s3 cp - s3://${BACKUP_BUCKET}/postgres/$$(date +%Y-%m-%dT%H:%M:%S).sql.gz
        --region ${AWS_DEFAULT_REGION:-eu-west-1}
      "
    env_file:
      - .env.production
    networks:
      - app-network
    deploy:
      restart_policy:
        condition: none

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  notebook_outputs:
  mojo_scripts:
  traefik_acme:

networks:
  app-network:
    driver: overlay
    attachable: true
