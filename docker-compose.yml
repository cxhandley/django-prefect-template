services:
  db:
    image: postgres:18-alpine
    container_name: django-prefect-db
    environment:
      POSTGRES_DB: django_prefect
      POSTGRES_USER: django
      POSTGRES_PASSWORD: django_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7.4-alpine
    container_name: django-prefect-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: django-prefect-rustfs
    command: --address 0.0.0.0:9000 /data
    environment:
      RUSTFS_ACCESS_KEY: rustfs
      RUSTFS_SECRET_KEY: rustfs_secret
    ports:
      - "9000:9000"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ─── Dev environment ────────────────────────────────────────────────────────
  # The VS Code DevContainer attaches to this service so it shares the
  # app-network and can reach db/redis/rustfs by service name.
  devcontainer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: django-devcontainer
    command: sleep infinity
    env_file:
      - .env
    # Override localhost values from .env with Docker service names
    environment:
      DATABASE_URL: postgresql://django:django_password@db:5432/django_prefect
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://rustfs:9000
    volumes:
      - .:/workspace:cached
      - notebook_outputs:/workspace/data/notebook_outputs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - app-network

  # ─── Background workers (CI / production-like runs) ─────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django-celery-worker
    command: celery -A config.celery worker -l info -Q default
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://django:django_password@db:5432/django_prefect
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://rustfs:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./notebooks:/notebooks
      - notebook_outputs:/app/data/notebook_outputs
    networks:
      - app-network

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django-flower
    command: celery -A config.celery flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - app-network

volumes:
  postgres_data:
  rustfs_data:
  notebook_outputs:

networks:
  app-network:
    driver: bridge
