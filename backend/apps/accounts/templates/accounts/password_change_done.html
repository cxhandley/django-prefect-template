{% extends "core/base_dashboard.html" %}
{% block title %}
    Password Changed - Django Pipeline
{% endblock title %}
{% block dashboard_content %}
    <div class="max-w-md">
        <div class="card bg-base-100 border border-base-200 shadow-sm">
            <div class="card-body text-center">
                <div class="flex justify-center mb-4">
                    <div class="bg-success/10 rounded-full p-4">
                        <svg xmlns="http://www.w3.org/2000/svg"
                             class="h-10 w-10 text-success"
                             fill="none"
                             viewBox="0 0 24 24"
                             stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                </div>
                <h1 class="text-2xl font-bold">Password Changed</h1>
                <p class="text-base-content/60 text-sm mt-2">Your password has been updated successfully.</p>
                <div class="mt-6">
                    <a href="{% url 'accounts:profile' %}" class="btn btn-primary w-full">Back to Profile</a>
                </div>
            </div>
        </div>
    </div>
{% endblock dashboard_content %}
