{% extends "core/base_public.html" %}
{% block title %}
    Password Reset Complete - Django Pipeline
{% endblock title %}
{% block public_content %}
    <div class="flex items-center justify-center min-h-[70vh]">
        <div class="card bg-base-100 shadow-xl border border-base-200 w-full max-w-md">
            <div class="card-body text-center">
                <div class="flex justify-center mb-4">
                    <div class="bg-success/10 rounded-full p-4">
                        <svg xmlns="http://www.w3.org/2000/svg"
                             class="h-10 w-10 text-success"
                             fill="none"
                             viewBox="0 0 24 24"
                             stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                </div>
                <h1 class="text-2xl font-bold">Password Updated</h1>
                <p class="text-base-content/60 text-sm mt-2">Your password has been set. You can now log in with your new password.</p>
                <div class="mt-6">
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary w-full">Log In</a>
                </div>
            </div>
        </div>
    </div>
{% endblock public_content %}
