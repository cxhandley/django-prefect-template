{% if presets %}
    <ul class="space-y-2" id="preset-list">
        {% for preset in presets %}
            <li class="flex items-center justify-between py-2 border-b border-base-200 last:border-0">
                <div>
                    <span class="font-medium text-sm">{{ preset.name }}</span>
                    <span class="text-xs text-base-content/70 ml-2">{{ preset.created_at|date:"M d, Y" }}</span>
                </div>
                <button type="button"
                        class="btn btn-ghost btn-xs text-error"
                        data-preset-id="{{ preset.id }}"
                        data-preset-name="{{ preset.name|escapejs }}"
                        onclick="openDeletePresetModal(this)">Delete</button>
            </li>
        {% endfor %}
    </ul>
    <!-- Delete preset confirmation modal -->
    <dialog id="delete_preset_modal"
            class="modal"
            aria-labelledby="delete_preset_modal_title">
        <div class="modal-box">
            <h3 id="delete_preset_modal_title" class="font-bold text-lg">Delete Preset</h3>
            <p class="py-4">
                Delete preset <strong id="delete_preset_name"></strong>? This cannot be undone.
            </p>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-ghost">Cancel</button>
                </form>
                <form id="delete_preset_form"
                      method="post"
                      hx-target="#preset-list"
                      hx-swap="outerHTML">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-error">Delete</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>
    <script>
    function openDeletePresetModal(btn) {
        var presetId = btn.dataset.presetId;
        var presetName = btn.dataset.presetName;
        var deleteUrl = "{% url 'flows:delete_preset' 0 %}".replace('/0/', '/' + presetId + '/');
        document.getElementById('delete_preset_name').textContent = '\u201c' + presetName + '\u201d';
        var form = document.getElementById('delete_preset_form');
        form.action = deleteUrl;
        form.setAttribute('hx-post', deleteUrl);
        htmx.process(form);
        document.getElementById('delete_preset_modal').showModal();
    }
    </script>
{% else %}
    <p class="text-sm text-base-content/70">No saved presets.</p>
{% endif %}
