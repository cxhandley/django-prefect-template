<!-- Sidebar component for dashboard pages
     Parameters: active_page (string) - highlights current nav item
     Values: "dashboard", "predictions", "history", "user_management", "admin_dashboard" -->
<nav aria-label="Dashboard navigation" class="min-h-full">
    <ul class="menu bg-base-200 min-h-screen w-64 p-4 pt-20">
        <li class="menu-title">
            <span class="text-base-content">Navigation</span>
        </li>
        <li>
            <a href="{% url 'flows:dashboard' %}"
               class="{% if active_page == 'dashboard' %}active{% endif %}"
               {% if active_page == 'dashboard' %}aria-current="page"{% endif %}>
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-5 w-5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Dashboard
            </a>
        </li>
        <li>
            <a href="{% url 'flows:dashboard' %}"
               class="{% if active_page == 'predictions' %}active{% endif %}"
               {% if active_page == 'predictions' %}aria-current="page"{% endif %}>
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-5 w-5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                Predictions
            </a>
        </li>
        <li>
            <a href="{% url 'flows:history' %}"
               class="{% if active_page == 'history' %}active{% endif %}"
               {% if active_page == 'history' %}aria-current="page"{% endif %}>
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-5 w-5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor"
                     aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                History
            </a>
        </li>
        {% if request.user.is_superuser or request.user.is_staff %}
            <li class="menu-title mt-4">
                <span class="text-base-content">Admin</span>
            </li>
            {% if request.user.is_superuser %}
                <li>
                    <a href="{% url 'accounts:user_list' %}"
                       class="{% if active_page == 'user_management' %}active{% endif %}"
                       {% if active_page == 'user_management' %}aria-current="page"{% endif %}>
                        <svg xmlns="http://www.w3.org/2000/svg"
                             class="h-5 w-5"
                             fill="none"
                             viewBox="0 0 24 24"
                             stroke="currentColor"
                             aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        User Management
                    </a>
                </li>
            {% endif %}
            <li>
                <a href="{% url 'flows:admin_dashboard' %}"
                   class="{% if active_page == 'admin_dashboard' %}active{% endif %}"
                   {% if active_page == 'admin_dashboard' %}aria-current="page"{% endif %}>
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-5 w-5"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor"
                         aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Monitoring
                </a>
            </li>
            <li>
                <a href="{% url 'training:dataset_list' %}"
                   class="{% if active_page == 'training_datasets' %}active{% endif %}"
                   {% if active_page == 'training_datasets' %}aria-current="page"{% endif %}>
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-5 w-5"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor"
                         aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h10c2 0 3 1 3 3M4 7h16M10 12h4" />
                    </svg>
                    Training Data
                </a>
            </li>
            <li>
                <a href="{% url 'training:training_history' %}"
                   class="{% if active_page == 'training_history' %}active{% endif %}"
                   {% if active_page == 'training_history' %}aria-current="page"{% endif %}>
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-5 w-5"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor"
                         aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                    Model Training
                </a>
            </li>
        {% endif %}
    </ul>
</nav>
