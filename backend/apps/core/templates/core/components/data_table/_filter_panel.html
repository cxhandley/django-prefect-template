{% comment %}
  Filter builder dropdown panel.
  Rendered inside the Alpine x-data root in table.html.
  All interactivity is Alpine-driven; no server round-trip until Apply is clicked.
{% endcomment %}
<div x-show="filtersOpen"
     x-transition
     @click.outside="filtersOpen = false"
     x-cloak
     class="absolute left-0 top-full mt-1 z-30 bg-base-100 border border-base-200 rounded-box shadow-lg w-[600px] p-4 space-y-3">
    <p class="text-xs font-semibold text-base-content/60 uppercase tracking-wide">Filter by</p>
    <!-- Filter rows -->
    <div class="space-y-2">
        <template x-for="(row, i) in filterRows" :key="i">
            <div class="flex items-center gap-2">
                <!-- Field selector -->
                <select x-model="row.field"
                        @change="row.op = ''; row.value = ''"
                        class="select select-bordered select-sm flex-1">
                    <option value="">Column…</option>
                    <template x-for="(cfg, key) in fieldConfigs" :key="key">
                        <option :value="key" x-text="cfg.label"></option>
                    </template>
                </select>
                <!-- Operator selector -->
                <select x-model="row.op"
                        :disabled="!row.field"
                        class="select select-bordered select-sm flex-1">
                    <option value="">Operator…</option>
                    <template x-for="opt in operatorsFor(row.field)" :key="opt.value">
                        <option :value="opt.value" x-text="opt.label"></option>
                    </template>
                </select>
                <!-- Value input — text / number / datetime -->
                <template x-if="needsValueInput(row.op) && typeFor(row.field) !== 'choice'">
                    <input x-model="row.value"
                           :type="typeFor(row.field) === 'datetime' ? 'date' : (typeFor(row.field) === 'number' ? 'number' : 'text')"
                           placeholder="Value…"
                           class="input input-bordered input-sm flex-1" />
                </template>
                <!-- Value input — choice select -->
                <template x-if="needsValueInput(row.op) && typeFor(row.field) === 'choice'">
                    <select x-model="row.value" class="select select-bordered select-sm flex-1">
                        <option value="">Choose…</option>
                        <template x-for="choice in choicesFor(row.field)" :key="choice">
                            <option :value="choice" x-text="choice"></option>
                        </template>
                    </select>
                </template>
                <!-- Spacer when no value input shown -->
                <template x-if="!needsValueInput(row.op)">
                    <span class="flex-1"></span>
                </template>
                <!-- Remove row button -->
                <button @click="removeFilterRow(i)"
                        class="btn btn-ghost btn-sm btn-square text-error"
                        type="button"
                        aria-label="Remove filter">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-4 w-4"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </template>
    </div>
    <!-- Add filter row -->
    <button @click="addFilterRow()"
            type="button"
            class="btn btn-ghost btn-sm gap-1 text-base-content/60">
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-4 w-4"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add filter
    </button>
    <!-- Actions -->
    <div class="flex justify-end gap-2 pt-1 border-t border-base-200">
        <button @click="clearFilters()" type="button" class="btn btn-ghost btn-sm">Clear all</button>
        <button @click="applyFilters()"
                type="button"
                :disabled="filterRows.length === 0"
                class="btn btn-primary btn-sm">Apply</button>
    </div>
</div>
