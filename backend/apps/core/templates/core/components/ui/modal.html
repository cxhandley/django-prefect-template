<!-- Modal component
     Parameters: modal_id (string), title (string)
     Content is loaded via htmx into the modal-body div -->
<dialog id="{{ modal_id }}" class="modal">
    <div class="modal-box">
        {% if title %}<h3 class="text-lg font-bold">{{ title }}</h3>{% endif %}
        <div id="{{ modal_id }}-body" class="py-4">
            {% block modal_content %}
            {% endblock modal_content %}
        </div>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn">Close</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
