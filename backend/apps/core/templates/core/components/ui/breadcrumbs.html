<!-- Breadcrumbs component
     Parameters: items (list of dicts with 'name' and optional 'url' keys) -->
<div class="breadcrumbs text-sm px-6 pt-4">
    <ul>
        {% for item in items %}
            <li>
                {% if item.url and not forloop.last %}
                    <a href="{{ item.url }}">{{ item.name }}</a>
                {% else %}
                    <span>{{ item.name }}</span>
                {% endif %}
            </li>
        {% endfor %}
    </ul>
</div>
