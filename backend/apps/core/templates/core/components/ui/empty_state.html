<!-- Empty State component
     Parameters: title, message, action_url (optional), action_text (optional) -->
<div class="flex flex-col items-center justify-center py-16 text-center">
    <svg xmlns="http://www.w3.org/2000/svg"
         class="h-16 w-16 text-base-content/20 mb-4"
         fill="none"
         viewBox="0 0 24 24"
         stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
    </svg>
    <h3 class="text-lg font-semibold text-base-content/70">{{ title|default:"Nothing here yet" }}</h3>
    {% if message %}<p class="text-sm text-base-content/50 mt-1 max-w-sm">{{ message }}</p>{% endif %}
    {% if action_url %}
        <a href="{{ action_url }}" class="btn btn-primary btn-sm mt-4">{{ action_text|default:"Get Started" }}</a>
    {% endif %}
</div>
