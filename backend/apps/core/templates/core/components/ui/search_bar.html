<!-- Search Bar component
     Parameters: placeholder, hx_url (GET endpoint), hx_target (target element selector) -->
<div class="form-control">
    <div class="input input-bordered flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="search"
               name="q"
               placeholder="{{ placeholder|default:'Search...' }}"
               class="grow border-none focus:outline-none bg-transparent"
               hx-get="{{ hx_url }}"
               hx-trigger="keyup changed delay:300ms"
               hx-target="{{ hx_target }}"
               hx-push-url="true"
               hx-indicator=".search-indicator" />
        <span class="loading loading-spinner loading-sm search-indicator htmx-indicator"></span>
    </div>
</div>
