repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: debug-statements
      - id: check-toml

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
        args: ["--extra-keys", "metadata.kernelspec metadata.language_info"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: ["--fix"]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/rtts/djlint
    rev: v1.36.4
    hooks:
      - id: djlint-reformat-django
        files: "backend/.*\\.html$"
      - id: djlint-django
        files: "backend/.*\\.html$"

  - repo: https://github.com/avencera/rustywind
    rev: v0.21.0
    hooks:
      - id: rustywind
        args: ["--write"]
        files: "backend/.*\\.html$"
