receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}
  resource:
    attributes:
      - key: deployment.environment
        value: staging
        action: insert

exporters:
  # Structured JSON to stdout — captured by Docker log driver, forwarded to
  # CloudWatch via the awslogs driver or a log agent.
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]
