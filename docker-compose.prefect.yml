# Compose override — Prefect pipeline backend (development)
#
# Adds the Prefect server and worker services to the base stack.
# Use this file together with docker-compose.yml when PIPELINE_BACKEND=prefect:
#
#   docker compose -f docker-compose.yml -f docker-compose.prefect.yml up
#
# The web and celery-worker services are extended here to inject the
# Prefect-specific environment variables they need when this backend is active.

services:
  # ─── Prefect Server (ephemeral SQLite — dev only) ──────────────────────────
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: django-prefect-server
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_DATABASE_CONNECTION_URL: sqlite+aiosqlite:////data/prefect.db
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - prefect_data:/data
    ports:
      - "4200:4200"   # Prefect UI — http://localhost:4200
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # ─── Prefect Worker ────────────────────────────────────────────────────────
  # Executes pipeline_flow tasks defined in apps.flows.backends.prefect.
  # Uses the same Django app image so it can import the flow code directly.
  prefect-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django-prefect-worker
    command: >
      sh -c "
        prefect work-pool create django-process-pool --type process --overwrite 2>/dev/null || true &&
        prefect worker start --pool django-process-pool
      "
    env_file:
      - .env
    environment:
      PIPELINE_BACKEND: prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      DATABASE_URL: postgresql://django:django_password@db:5432/django_prefect
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://rustfs:9000
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_INTERNAL_URL: http://web:8000
      PROJECT_ROOT: /project
      NOTEBOOKS_DIR: /project/notebooks
      NOTEBOOK_OUTPUT_DIR: /project/data/notebook_outputs
    volumes:
      - ./backend:/app
      - .:/project
      - notebook_outputs:/project/data/notebook_outputs
    depends_on:
      prefect-server:
        condition: service_healthy
      db:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - app-network

  # ─── Extend web and celery-worker with Prefect env vars ───────────────────
  web:
    environment:
      PIPELINE_BACKEND: prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_UI_URL: http://localhost:4200
      DJANGO_INTERNAL_URL: http://web:8000

  celery-worker:
    environment:
      PIPELINE_BACKEND: prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      DJANGO_INTERNAL_URL: http://web:8000

volumes:
  prefect_data:
